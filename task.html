async function apiGet(apiUrl) {
  const res = await fetch(apiUrl, {
    method: 'GET',
    redirect: 'follow'
  });
  const text = await res.text();
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    throw new Error('API応答がJSONではありません:' + text.slice(0, 160));
  }
  if (parsed.error) throw new Error(parsed.error);
  if (!Array.isArray(parsed.clients) || !Array.isArray(parsed.tasks)) {
    throw new Error('期待した形式ではありません');
  }
  return parsed;
}
async function apiSave(apiUrl, data) {
  const res = await fetch(apiUrl, {
    method: 'POST',
    // text/plainはCORSプリフライトを避けるための重要設定
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    body: JSON.stringify(data),
    redirect: 'follow'
  });
  const text = await res.text();
  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    throw new Error('API応答がJSONではありません:' + text.slice(0, 160));
  }
  if (!parsed.ok) throw new Error(parsed.error || '保存失敗');
  return parsed;
}
